<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">Week 7 Local IDS Network Segmentation Topology</title>
  <desc id="desc">Local IDS topology showing Kali in OPT1 DMZ, pfSense routing and firewalling, Victim and Zeek on LAN, and Zeek logs exported to dataset.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .box { fill: #fff; stroke: #cfd8e3; stroke-width: 2; }
      .router { fill: #fff7ed; stroke: #c97016; stroke-width: 2.5; }
      .dmz { fill: #fff1f2; stroke: #b42318; stroke-width: 2; }
      .lan { fill: #edf7ff; stroke: #2f6fbb; stroke-width: 2; }
      .data { fill: #ecfdf3; stroke: #27845a; stroke-width: 2; }
      .title { font: 700 25px Arial, sans-serif; fill: #111827; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .note { font: 13px Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 2.3; stroke-dasharray: 8 8; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="650"/>
  <text class="title" x="42" y="48">Week 7 - Local IDS Network Segmentation and Zeek Telemetry</text>
  <text class="note" x="42" y="76">Goal: isolate Kali, route controlled traffic through pfSense, capture Victim traffic with Zeek, then export structured telemetry.</text>

  <rect class="box" x="40" y="110" width="1100" height="455" rx="10"/>

  <rect class="box" x="80" y="150" width="210" height="90" rx="8"/>
  <text class="label" x="105" y="185">VMware NAT</text>
  <text class="text" x="105" y="213">VMnet8</text>

  <rect class="router" x="410" y="138" width="280" height="185" rx="10"/>
  <text class="label" x="442" y="173">pfSense Firewall</text>
  <text class="text" x="442" y="203">WAN: 192.168.44.133/24</text>
  <text class="text" x="442" y="228">LAN: 192.168.1.1/24</text>
  <text class="text" x="442" y="253">OPT1: 10.10.10.1/24</text>
  <text class="note" x="442" y="286">Final rule: Kali -> Victim only</text>

  <rect class="dmz" x="80" y="370" width="250" height="120" rx="10"/>
  <text class="label" x="112" y="405">DMZ / OPT1</text>
  <text class="text" x="112" y="435">Kali attacker</text>
  <text class="text" x="112" y="462">10.10.10.10/24</text>

  <rect class="lan" x="780" y="345" width="280" height="170" rx="10"/>
  <text class="label" x="812" y="380">LAN Segment</text>
  <text class="text" x="812" y="410">Victim Ubuntu</text>
  <text class="text" x="812" y="436">192.168.1.10/24</text>
  <text class="text" x="812" y="466">Zeek sensor</text>
  <text class="text" x="812" y="492">192.168.1.20/24</text>

  <rect class="data" x="435" y="395" width="260" height="115" rx="10"/>
  <text class="label" x="465" y="430">Telemetry Output</text>
  <text class="text" x="465" y="458">conn.log + http.log</text>
  <text class="text" x="465" y="485">CSV dataset export</text>

  <path class="arrow" d="M 290 195 L 400 195"/>
  <path class="arrow" d="M 330 430 L 405 430 L 405 280"/>
  <path class="arrow" d="M 690 280 L 780 430"/>
  <path class="dash" d="M 780 480 L 705 455"/>
  <path class="dash" d="M 565 395 L 565 330"/>

  <text class="note" x="315" y="178">WAN uplink</text>
  <text class="note" x="325" y="410">controlled traffic</text>
  <text class="note" x="704" y="318">routed to Victim</text>
  <text class="note" x="676" y="505">Zeek logs</text>

  <rect class="box" x="80" y="585" width="1000" height="40" rx="7"/>
  <text class="note" x="105" y="610">Security decision: Kali can reach the Victim target but should not freely access the monitoring host or other LAN systems.</text>
</svg>
